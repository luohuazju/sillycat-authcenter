# 注意：这些是示例值，生产环境请使用真实的 secrets
# 可以使用 kubectl create secret 命令创建，或使用 sealed-secrets/vault 等工具管理

---
apiVersion: v1
kind: Namespace
metadata:
  name: keycloak
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: keycloak
type: Opaque
stringData:
  password: "change-this-password"
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: keycloak
type: Opaque
stringData:
  admin-password: "change-this-admin-password"
